<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indelible Publish</title>
</head>
<body>
    <header class="navbar">
        <nav class="topnav" id="mainnav">
            <a class="active" href="#" data-group="attestations">Attestations</a>
            <a href="#" data-group="delegations">Delegations</a>
            <a href="#" data-group="ens">ENS</a>
            
        </nav>
        <a href="/" class="changePage">Go to Verify -></a>
        <div class="settings-wrapper">
            <button class="settings-button" id="settingsToggle">Settings</button>
            <div class="settings-dropdown" id="settingsDropdown">
                <label class="settings-label" for="chainSelect">Chain</label>
                <select id="chainSelect" class="settings-input">
                    <option value="sepolia" selected>Sepolia</option>
                    <option value="ethereum">Ethereum</option>
                    <option value="arbitrum">Arbitrum</option>
                    <option value="base">Base</option>
                </select>
            </div>
        </div>
    </header>
    <header class="navbar">
        <nav class="topnav subnav" id="subnav-attestations">
            <a class="active" href="#attestations-attest">Attest</a>
            <a href="#attestations-revoke">Revoke</a>
            <a href="#attestations-prove-quote">Prove Quote</a>
        </nav>
    </header>

    <div class="topnav subnav" id="subnav-delegations">
        <a href="#delegations-delegate">Delegate</a>
        <a href="#delegations-revoke">Revoke</a>
    </div>

    <section id="attestations-attest" class="sections">
        <form>
            <label class="inputLabel" for="articleInput">Article Text</label>
            <div><textarea id="articleInput" class="input textEntry"></textarea></div>
            <label class="inputLabel" for="cidInput" >CID</label>
            <div><input type="text" class="input cid" id="cid" readonly="true"></input></div>
            <label class="inputLabel" for="parentIpfsHashInput">Parent IPFS CID</label>
            <div><input type="text" class="input cid" id="parentIpfsHashInput" placeholder="Optional"></input></div>
            <label class="inputLabel" for="authorityInput">Authority Address</label>
            <div><input type="text" class="input cid" id="authorityInput" placeholder="Optional"></input></div>
        
            <div class="commit-actions">
                <button type="submit" class="inputLabel" id="commitAttestation">Continue</button>
                <p>You will have to wait 60 seconds to prevent someone from frontrunning your attestation.</p>
                <span id="commitTimer" class="commit-timer" hidden></span>
            </div>
            <button type="button" class="inputLabel" id="revealAttestation" hidden>Reveal</button>
        
        </form>
    </section>

    <section id="attestations-revoke" class="sections">
        <form>
            <label class="inputLabel" for="revokeAttestationIdInput">Attestation ID</label>
            <div><input type="text" class="input cid" id="revokeAttestationIdInput" placeholder="e.g. 1"></div>
            <div class="commit-actions">
                <button type="submit" class="inputLabel" id="revokeAttestationButton">Revoke Attestation</button>
                <span id="revokeAttestationStatus" class="commit-timer" hidden></span>
            </div>
        </form>
    </section>

    <section id="attestations-prove-quote" class="sections">
        <form>
            <label class="inputLabel" for="proveArticleInput">Article Text</label>
            <div><textarea id="proveArticleInput" class="input textEntry"></textarea></div>
            <label class="inputLabel" for="proveQuoteInput">Quote</label>
            <div><textarea id="proveQuoteInput" class="input textEntry"></textarea></div>
            <label class="inputLabel" for="proveAuthorityInput">Authority Address</label>
            <div><input type="text" class="input cid" id="proveAuthorityInput" placeholder="0x..."></div>
            <div class="commit-actions">
                <button type="submit" class="inputLabel" id="proveQuoteButton">Download Proof</button>
                <span id="proveQuoteStatus" class="commit-timer" hidden></span>
            </div>
        </form>
    </section>

    <section id="delegations-delegate" class="sections">
        <form>
            <label class="inputLabel" for="delegateAddressInput">Delegate Address</label>
            <div><input type="text" class="input cid" id="delegateAddressInput" placeholder="0x..."></div>
            <div class="commit-actions">
                <button type="submit" class="inputLabel" id="delegateButton">Delegate</button>
                <span id="delegateStatus" class="commit-timer" hidden></span>
            </div>
        </form>
    </section>

    <section id="delegations-revoke" class="sections">
        <form>
            <label class="inputLabel">Current Delegate</label>
            <div><input type="text" class="input cid" id="currentDelegateDisplay" readonly placeholder="Connect wallet to view"></div>
            <button type="button" class="inputLabel" id="loadDelegateButton">Load Delegate</button>
            <div class="commit-actions">
                <button type="submit" class="inputLabel" id="revokeDelegationButton">Revoke Delegation</button>
                <span id="revokeDelegationStatus" class="commit-timer" hidden></span>
            </div>
        </form>
    </section>

    <section id="ens" class="sections">
        <form>
            <label class="inputLabel" for="ensNameInput">ENS Name</label>
            <div><input type="text" class="input" id="ensNameInput" placeholder="nytimes.eth"></div>
            <div class="commit-actions">
                <button type="submit" class="inputLabel" id="createBindingButton">Create Binding</button>
                <span id="bindingStatus" class="commit-timer" hidden></span>
            </div>
        </form>
    </section>



    <script type="module" src="/src/tabs.js"></script>
    <script type="module" src="/src/publish.js"></script>
</body>
</html>
