<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indelible Verify</title>
</head>
<body>
    <header class="navbar">
        <nav class="topnav" id="mainnav">
            <a class="active" href="#" data-group="verify-article">Verify Article</a>
            <a href="#" data-group="verify-quote">Verify Quote</a>
        </nav>
        <a href="publish" class="changePage">Go to Publish -></a>

        
        <div class="settings-wrapper">
            <button class="settings-button" id="settingsToggle">Settings</button>
            <div class="settings-dropdown" id="settingsDropdown">
                <label class="settings-label" for="chainSelect">Chain</label>
                <select id="chainSelect" class="settings-input">
                    <option value="sepolia" selected>Sepolia</option>
                    <option value="ethereum">Ethereum</option>
                    <option value="arbitrum">Arbitrum</option>
                    <option value="base">Base</option>
                </select>
                <label class="settings-label" for="rpcInput">RPC URL</label>
                <input id="rpcInput" class="settings-input"></input>
            </div>
        </div>
    </header>

    <section id="verify-article" class="sections">
        <form>
            <label class="inputLabel" for="articleInput">Article Text</label>
            <div><textarea id="articleInput" class="input textEntry"></textarea></div>
            <label class="inputLabel" for="cidInput" >CID</label>
            <div><input type="text" class="input cid" id="cid"></input></div>
            <label class="inputLabel" for="authorityInput">Authority Address</label>
            <div><input type="text" class="input cid" id="authorityInput" placeholder="Optional"></input></div>
        
            <div class="commit-actions">
                <button type="submit" class="inputLabel" id="verifyButton">Verify</button>
                <span id="verifyStatus" class="commit-timer" hidden></span>
            </div>

        </form>
        <div id="verifyResult" hidden>
            <h3 id="verifyHeading"></h3>
            <ul id="verifyDetails"></ul>
        </div>
    </section>

    <section id="verify-quote" class="sections">
        <form id="verifyQuoteForm">
            <label class="inputLabel" for="proofFileInput">Upload Merkle Proof JSON</label>
            <div><input type="file" accept=".json" class="input" id="proofFileInput"></div>
            <div class="commit-actions">
                <button type="submit" class="inputLabel" id="verifyQuoteButton">Verify Quote</button>
                <span id="verifyQuoteStatus" class="commit-timer" hidden></span>
            </div>
        </form>
        <div id="verifyQuoteResult" hidden>
            <h3 id="verifyQuoteHeading"></h3>
            <p id="verifyQuoteText" class="quote-text"></p>
            <ul id="verifyQuoteDetails"></ul>
        </div>
    </section>



    <script type="module" src="/src/tabs.js"></script>
    <script type="module" src="/src/verify.js"></script>
</body>
</html>
