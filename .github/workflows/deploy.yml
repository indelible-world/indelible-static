name: Deploy static site

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: 'deploy'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload to IPFS via Pinata
        id: ipfs
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync, readdirSync, statSync, writeFileSync } from 'fs';
          import { join, relative } from 'path';
          import { appendFileSync } from 'fs';

          function collectFiles(dir) {
            const results = [];
            for (const entry of readdirSync(dir)) {
              const full = join(dir, entry);
              if (statSync(full).isDirectory()) results.push(...collectFiles(full));
              else results.push(full);
            }
            return results;
          }

          const files = collectFiles('./dist');
          const form = new FormData();
          for (const file of files) {
            const rel = relative('./dist', file);
            form.append('file', new Blob([readFileSync(file)]), rel);
          }
          form.append('network', 'public');

          const res = await fetch('https://uploads.pinata.cloud/v3/files', {
            method: 'POST',
            headers: { Authorization: `Bearer ${process.env.PINATA_JWT}` },
            body: form,
          });
          const json = await res.json();
          const cid = json?.data?.cid;
          if (!cid) throw new Error(JSON.stringify(json));
          console.log(`Pinned to IPFS: ipfs://${cid}`);
          writeFileSync('./dist/ipfs.json', JSON.stringify({ cid, url: `ipfs://${cid}` }));
          appendFileSync(process.env.GITHUB_OUTPUT, `cid=${cid}\n`);
          EOF
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=indelible-static
