# Simple workflow for deploying static content to GitHub Pages
name: Deploy static site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload to IPFS via Pinata
        id: ipfs
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync, readdirSync, statSync, writeFileSync } from 'fs';
          import { join, relative } from 'path';
          import { appendFileSync } from 'fs';

          function collectFiles(dir) {
            const results = [];
            for (const entry of readdirSync(dir)) {
              const full = join(dir, entry);
              if (statSync(full).isDirectory()) results.push(...collectFiles(full));
              else results.push(full);
            }
            return results;
          }

          const files = collectFiles('./dist');
          const form = new FormData();
          for (const file of files) {
            const rel = relative('./dist', file);
            form.append('file', new Blob([readFileSync(file)]), rel);
          }
          form.append('network', 'public');

          const res = await fetch('https://uploads.pinata.cloud/v3/files', {
            method: 'POST',
            headers: { Authorization: `Bearer ${process.env.PINATA_JWT}` },
            body: form,
          });
          const json = await res.json();
          const cid = json?.data?.cid;
          if (!cid) throw new Error(JSON.stringify(json));
          console.log(`Pinned to IPFS: ipfs://${cid}`);
          writeFileSync('./dist/ipfs.json', JSON.stringify({ cid, url: `ipfs://${cid}` }));
          appendFileSync(process.env.GITHUB_OUTPUT, `cid=${cid}\n`);
          EOF
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload dist folder
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
